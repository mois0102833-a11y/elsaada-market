<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | السعادة ماركت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar" id="navbar-placeholder"></header>
    <div id="sidebar-placeholder"></div>

    <main class="main-content" style="min-height: 70vh;">
        <section class="category-section container">
            <div class="section-title" style="border-bottom: none; text-align: center;">
                <h2><i class="fa-solid fa-headset text-primary"></i> تواصل معنا</h2>
                <p style="color: var(--text-light); margin-top:10px;">نحن هنا دائماً لخدمتك والإجابة على استفساراتك.</p>
            </div>

            <div style="display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-top: 40px;">
                <!-- Phone -->
                <div class="product-card contact-card-phone"
                    style="flex: 1; min-width: 250px; padding: 40px 20px; background-color: #dee9e0; color: #1f1b1b; border: 1px solid #94a3b8;">
                    <a href="tel:01000556041" style="color: inherit; text-decoration: none;">
                        <i class="fa-solid fa-phone" style="font-size: 50px; margin-bottom: 20px; color: #2563eb;"></i>
                        <h3 style="margin-bottom: 10px; color: #080808;">اتصل بنا</h3>
                        <p style="color: #1f1b1b; font-size: 1.2rem; font-weight: bold; direction: ltr;">
                            01000556041</p>
                        <p style="color: #020202; margin-top: 10px; font-weight: bold;">السوبر ماركت شغال 24
                            ساعة لخدمتكم</p>
                    </a>
                </div>

                <!-- Location Map -->
                <div class="product-card contact-card-map"
                    style="flex: 1; min-width: 250px; padding: 40px 20px; background-color: #1F2937; color: #ffffff; border: 1px solid #374151;">
                    <img src="images/products/map_image.jpg" alt="خريطة" style="width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
                    <h3 style="margin-bottom: 10px; color: #181717;">موقعنا</h3>
                    <p style="color: #110f0f; font-weight: bold; margin-bottom: 10px;">محافظة البحيرة، مركز أبو
                        حمص، قرية قافلة</p>
                    <a href="https://maps.app.goo.gl/gzSHnhtvdsL46KBx9" target="_blank" class="btn btn-primary"
                        style="margin-top: 10px; background-color: #101110; border: none; color: white;">فتح الخريطة <i
                            class="fa-solid fa-map-location-dot"></i></a>
                </div>

                <!-- WhatsApp -->
                <div class="product-card contact-card-whatsapp"
                    style="flex: 1; min-width: 250px; padding: 40px 20px; background-color: #1F2937; color: #ffffff; border: 1px solid #374151;">
                    <i class="fa-brands fa-whatsapp" style="font-size: 50px; color: #4ADE80; margin-bottom: 20px;"></i>
                    <h3 style="margin-bottom: 10px; color: #0c0b0b;">واتساب</h3>
                    <a href="https://wa.me/201000556041" target="_blank" class="btn btn-primary"
                        style="margin-top: 10px; background-color: #141414; border: none; color: white;">راسلنا الآن</a>
                    <p style="color: #000000; margin-top: 10px; font-weight: bold;">السوبر ماركت شغال 24 ساعة
                        لخدمتكم</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer" id="footer-placeholder"></footer>

    <script src="products.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>

</html>
