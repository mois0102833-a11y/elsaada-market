<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللحوم والخضروات | السعادة ماركت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar Placeholder -->
    <header class="navbar" id="navbar-placeholder"></header>

    <!-- Cart Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content Area -->
    <main class="main-content" style="min-height: 70vh;">
        <section class="category-section container">
            <div class="section-title">
                <h2><i class="fa-solid fa-drumstick-bite text-red"></i> اللحوم والخضروات الطازجة</h2>
            </div>
            <div class="products-grid">
                <!-- Products will be loaded dynamically -->
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <footer class="footer" id="footer-placeholder"></footer>

    <!-- Page Specific Script -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (window.loadProducts) {
                window.loadProducts('meats_veg');
            }
        });
    </script>

    <script src="products.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
